name: API env variables for deploy
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    environment: 
      name: github-pages
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install
        run: npm install

      - name: Build
        run: npm run build
        env: 
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Verify environment variable
        run: |
          echo "API URL: $VITE_API_BASE_URL"
          echo "API URL SECRET: ${{secrets.VITE_API_BASEURL}}"
          echo "API URL VARIABLE: ${{vars.VITE_API_BASEURL}}"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: gh-pages
          publish_dir: ./dist
          github_token: ${{ secrets.GITHUB_TOKEN }}
